<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login · CampusAI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="text-center mb-4">
      <i class="fa-solid fa-graduation-cap login-icon"></i>
      <h3 class="mt-2 mb-0">CampusAI Admin</h3>
      <p class="text-muted small">Sign in to manage the knowledge base and view analytics</p>
    </div>

    <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label small">Username</label>
        <input type="text" class="form-control" id="username" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label small">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="loginSubmitBtn">
        <span id="loginBtnText">Sign In</span>
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('main.index') }}" class="small">&larr; Back to chatbot</a>
    </div>
  </div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginSubmitBtn');
  const alertBox = document.getElementById('loginAlert');
  alertBox.classList.add('d-none');
  btn.disabled = true;
  document.getElementById('loginBtnText').textContent = 'Signing in...';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.redirect || '/';
    } else {
      alertBox.textContent = data.error || 'Login failed.';
      alertBox.classList.remove('d-none');
    }
  } catch (err) {
    alertBox.textContent = 'Network error. Please try again.';
    alertBox.classList.remove('d-none');
  } finally {
    btn.disabled = false;
    document.getElementById('loginBtnText').textContent = 'Sign In';
  }
});
</script>
</body>
</html>
